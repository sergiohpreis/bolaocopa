events {
    worker_connections 256;
}

http {
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    upstream backend {
        server bolaocopa-backend:8080;
    }

    upstream frontend {
        server bolaocopa-frontend:80;
    }

    server {
        listen 80;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # PROTOTYPE — resolução lazy para não quebrar quando o container não existe
        location /whatsapp/ {
            resolver           127.0.0.11 valid=5s;
            set $whatsapp_upstream http://bolaocopa-whatsapp:9090;
            rewrite            ^/whatsapp/(.*)$ /$1 break;
            proxy_pass         $whatsapp_upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
        }

        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
        }

        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host $host;
        }
    }
}
